version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-server
    ports:
      - "8888:8080"
    volumes:
      - ./searxng-config:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_INSTANCE_NAME=SearXNG Tools Server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  searxng-config:
    driver: local
